description: Two artists exploring the quiet tension between permanence and impermanence — painting and sculpture in conversation with coastal light.
essay: |
  Elena Marsh and Julian Cole approach their respective mediums from opposite ends of the material spectrum — Marsh through the fluid accumulation of pigment on linen, Cole through the slow subtraction of form from wood and stone. Yet both artists share a preoccupation with the quality of coastal light: its capacity to flatten and reveal, to dissolve edges while sharpening attention.

  In "Still Life with Light," their works are placed in direct dialogue for the first time. Marsh's large-scale paintings — some exceeding six feet — occupy the gallery's main walls, their surfaces thick with beeswax and oil, colors shifting between the saturated greens of late summer and the bleached whites of winter shoreline.
pullQuote: '"The painting is finished when the light in it matches the light outside the window." — Elena Marsh'
